<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" font-family="'Courier New', ui-monospace, monospace">
  <rect width="720" height="440" rx="4" fill="#f4efe4"/>
  <rect x="16" y="16" width="688" height="408" rx="3" fill="#fffdf8" stroke="#e8e0cc" stroke-width="1"/>

  <!-- Heading -->
  <text x="40" y="52" font-size="22" fill="#211d15">Your cart vs. official CPI</text>
  <text x="40" y="74" font-size="13" fill="#6f6553">Cumulative price change since Jan 2026 (same base, same scale)</text>

  <!-- Legend -->
  <rect x="486" y="42" width="18" height="3" fill="#c23b2c"/>
  <text x="510" y="48" font-size="12" fill="#6f6553">Your cart</text>
  <rect x="486" y="60" width="18" height="3" fill="#2b3a55"/>
  <text x="510" y="66" font-size="12" fill="#6f6553">CPI food-at-home</text>

  <g transform="translate(40,90)">
    <!-- Zero baseline -->
    <line x1="40" y1="280" x2="600" y2="280" stroke="#6f6553" stroke-width="1" stroke-dasharray="2 3"/>
    <text x="606" y="284" font-size="11" fill="#6f6553">0%</text>

    <!-- Official CPI line (blue-black) -->
    <path d="M40.00,280.00 L320.00,272.94 L600.00,273.63" fill="none" stroke="#2b3a55" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="40" cy="280" r="4" fill="#fffdf8" stroke="#2b3a55" stroke-width="2"/>
    <circle cx="320" cy="272.9" r="4" fill="#fffdf8" stroke="#2b3a55" stroke-width="2"/>
    <circle cx="600" cy="273.6" r="4" fill="#fffdf8" stroke="#2b3a55" stroke-width="2"/>
    <text x="588" y="296" font-size="12" fill="#2b3a55" text-anchor="end">+0.4%</text>

    <!-- Your cart line (brick-red) -->
    <path d="M40.00,280.00 L320.00,172.41 L600.00,40.00" fill="none" stroke="#c23b2c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="40" cy="280" r="4" fill="#fffdf8" stroke="#c23b2c" stroke-width="2"/>
    <circle cx="320" cy="172.4" r="4" fill="#fffdf8" stroke="#c23b2c" stroke-width="2"/>
    <circle cx="600" cy="40" r="4" fill="#fffdf8" stroke="#c23b2c" stroke-width="2"/>
    <text x="588" y="34" font-size="13" fill="#c23b2c" text-anchor="end" font-weight="bold">+15.7%</text>

    <!-- Month labels -->
    <text x="40" y="305" font-size="12" fill="#6f6553" text-anchor="middle">Jan</text>
    <text x="320" y="305" font-size="12" fill="#6f6553" text-anchor="middle">Feb</text>
    <text x="600" y="305" font-size="12" fill="#6f6553" text-anchor="middle">Mar</text>
  </g>
</svg>
